<h1>Instellingen</h1>

<mat-tab-group>
    <mat-tab label="Algemeen"></mat-tab>

    <mat-tab label="Prijsinstellingen">
        <p>Wijzig de instellingen voor de prijzen die worden doorgevoerd in de offertes en facturen die automatisch in Invoice Ninja worden aangemaakt.</p>
    
        <table mat-table [dataSource]="priceSettingsData">
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Naam</th>
                <td mat-cell *matCellDef="let element">{{element.name}}</td>
            </ng-container>
            
            <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef>Productomschrijving</th>
                <td mat-cell *matCellDef="let element">{{element.description}}</td>
            </ng-container>

            <ng-container matColumnDef="price">
                <th mat-header-cell *matHeaderCellDef>Prijs</th>
                <td mat-cell *matCellDef="let element">{{element.price}}</td>
            </ng-container>

            <ng-container matColumnDef="fixed">
                <th mat-header-cell *matHeaderCellDef>Vaste prijs</th>
                <td mat-cell *matCellDef="let element">{{element.fixed}}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumnsPriceSettings"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumnsPriceSettings;"></tr>
        </table>
    </mat-tab>
</mat-tab-group>
