<h2>Klant bewerken</h2>

<form [formGroup]="editClientForm" (ngSubmit)="editClient()">
    <mat-form-field class="full-width">
        <mat-label>Naam klant</mat-label>
        <input matInput formControlName="name">
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Adres</mat-label>
        <input matInput formControlName="address">
    </mat-form-field>

    <mat-form-field class="half-width">
        <mat-label>Postcode</mat-label>
        <input matInput formControlName="postalCode">
    </mat-form-field>
    <mat-form-field class="half-width">
        <mat-label>Woonplaats</mat-label>
        <input matInput formControlName="city">
    </mat-form-field>

    <h3>Contactpersoon</h3>
        <mat-form-field class="half-width">
            <mat-label>Voornaam</mat-label>
            <input matInput formControlName="firstName">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>Achternaam</mat-label>
            <input matInput formControlName="lastName">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>E-mailadres</mat-label>
            <input type="email" matInput formControlName="emailAddress">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>Telefoonnummer</mat-label>
            <input matInput formControlName="phone">
        </mat-form-field>

    <button mat-raised-button color="primary" type="submit"><mat-icon>save</mat-icon> Opslaan</button>
</form>
