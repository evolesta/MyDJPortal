<h2>Klant toevoegen</h2>

<form [formGroup]="addClientForm" (ngSubmit)="addClient()">
    <mat-form-field class="full-width">
        <mat-label>Naam klant</mat-label>
        <input matInput formControlName="name">
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Adres</mat-label>
        <input matInput formControlName="address1">
    </mat-form-field>

    <mat-form-field class="half-width">
        <mat-label>Postcode</mat-label>
        <input matInput formControlName="postal_code">
    </mat-form-field>
    <mat-form-field class="half-width">
        <mat-label>Woonplaats</mat-label>
        <input matInput formControlName="city">
    </mat-form-field>

    <h3>Contactpersoon</h3>
    <div formGroupName="contacts">
        <mat-form-field class="half-width">
            <mat-label>Voornaam</mat-label>
            <input matInput formControlName="first_name">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>Achternaam</mat-label>
            <input matInput formControlName="last_name">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>E-mailadres</mat-label>
            <input type="email" matInput formControlName="email">
        </mat-form-field>
        <mat-form-field class="half-width">
            <mat-label>Telefoonnummer</mat-label>
            <input matInput formControlName="phone">
        </mat-form-field>
    </div>

    <button mat-raised-button color="primary" type="submit"><mat-icon>save</mat-icon> Toevoegen</button>
</form>
