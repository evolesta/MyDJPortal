<h1 mat-dialog-title>Weet je het zeker?</h1>
<mat-dialog-content>
    Weet je zeker dat je deze locatie wilt verwijderen?
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button [mat-dialog-close]>Annuleren</button>
    <button mat-raised-button color="warn" (click)="deleteLocation()">Verwijderen</button>
</mat-dialog-actions>
