<h1>Locatie toevoegen</h1>

<form [formGroup]="addLocationForm" (ngSubmit)="addLocation()">
    <mat-form-field class="full-width">
        <mat-label>Naam locatie</mat-label>
        <input matInput formControlName="name">
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Contactpersoon</mat-label>
        <input matInput formControlName="contactName">
    </mat-form-field>

    <mat-form-field class="full-width">
        <mat-label>Adres</mat-label>
        <input matInput formControlName="address">
    </mat-form-field>

    <mat-form-field class="half-width">
        <mat-label>Postcode</mat-label>
        <input matInput formControlName="postalCode">
    </mat-form-field>
    <mat-form-field class="half-width">
        <mat-label>Woonplaats</mat-label>
        <input matInput formControlName="city">
    </mat-form-field>

    <mat-form-field class="half-width">
        <mat-label>E-mailadres</mat-label>
        <input matInput formControlName="email">
    </mat-form-field>
    <mat-form-field class="half-width">
        <mat-label>Telefoonnummer</mat-label>
        <input matInput formControlName="phone">
    </mat-form-field>

    <button mat-raised-button color="primary" type="submit"><mat-icon>save</mat-icon> Toevoegen</button>
</form>
