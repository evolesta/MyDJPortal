<h1>Locaties</h1>

<div class="button">
    <p><button mat-raised-button color="primary" routerLink="/admin/dashboard/locations/add"><mat-icon>add</mat-icon> Nieuwe locatie</button></p>
</div>

<table mat-table [dataSource]="locations">
    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Naam</th>
        <td mat-cell *matCellDef="let element">{{element.name}}</td>
    </ng-container>

    <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef>Plaats</th>
        <td mat-cell *matCellDef="let element">{{element.city}}</td>
    </ng-container>

    <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Telefoon</th>
        <td mat-cell *matCellDef="let element">{{element.phone}}</td>
    </ng-container>

    <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>E-mailadres</th>
        <td mat-cell *matCellDef="let element">{{element.email}}</td>
    </ng-container>

    <ng-container matColumnDef="options">
        <th mat-header-cell *matHeaderCellDef class="optionsBtn">Opties</th>
        <td mat-cell *matCellDef="let element">
            <button mat-menu-item [matMenuTriggerFor]="menu" [matMenuTriggerData]="{id: element.id}"><mat-icon>more_vert</mat-icon></button>
        </td>
        <mat-menu #menu="matMenu">
            <ng-template matMenuContent let-id="id">
                <button mat-menu-item routerLink="/admin/dashboard/locations/edit/{{id}}"><mat-icon>edit</mat-icon> Bewerken</button>
                <button mat-menu-item (click)="deleteLocation(id)"><mat-icon>delete</mat-icon> Verwijderen</button>
            </ng-template>
        </mat-menu>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
