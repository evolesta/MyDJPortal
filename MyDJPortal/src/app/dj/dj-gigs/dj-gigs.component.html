<app-dj-aheader></app-dj-aheader>

<div class="content">
    <h1>Feesten</h1>

    <p><button type="button" mat-raised-button color="primary" (click)="openAddNewGigDialog()"><mat-icon>add</mat-icon> Nieuw feest</button></p>

    <div class="mat-elevation-z8">
        <table mat-table [dataSource]="gigSource">
            <ng-container matColumnDef="gigDate">
                <th mat-header-cell *matHeaderCellDef>Datum</th>
                <td mat-cell *matCellDef="let element">{{ element.gigDate }}</td>
            </ng-container>
            <ng-container matColumnDef="location">
                <th mat-header-cell *matHeaderCellDef>Locatie</th>
                <td mat-cell *matCellDef="let element">{{ element.location_id }}</td>
            </ng-container>
            <ng-container matColumnDef="client">
                <th mat-header-cell *matHeaderCellDef>Klant</th>
                <td mat-cell *matCellDef="let element">{{ element.contacts[0].client_id }}</td>
            </ng-container>
            <ng-container matColumnDef="options">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element" class="options">
                    <button mat-icon-button [matMenuTriggerFor]="menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="openEditGigDialog(element.id)">
                          <mat-icon>edit</mat-icon>
                          <span>Bewerken</span>
                        </button>
                        <button mat-menu-item (click)="openDeleteGigDialog(element.id)">
                          <mat-icon>delete</mat-icon>
                          <span>Verwijderen</span>
                        </button>
                      </mat-menu>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]"
                 showFirstLastButtons 
                 aria-label="Select page of periodic elements">
  </mat-paginator>
    </div>
</div>

<app-dj-afooter></app-dj-afooter>
