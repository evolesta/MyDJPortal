<h2 mat-dialog-title><mat-icon>add</mat-icon> Feest toevoegen</h2>

<form [formGroup]="addGigForm" (ngSubmit)="addNewGig()">
    <mat-dialog-content class="mat-typography">

        <mat-form-field appearance="legacy" class="full-width">
            <mat-label>Klant</mat-label>
            <input matInput type="text" name="name" formControlName="client_id"
            [matAutocomplete]="auto">
            <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
                <mat-option *ngFor="let client of filteredClients | async" [value]="client">
                    {{ displayFn(client) }}
                </mat-option>
            </mat-autocomplete>
        </mat-form-field>

    </mat-dialog-content>

    <mat-dialog-actions>
        <button mat-button mat-dialog-close>Annuleren</button>
        <button type="submit" mat-raised-button color="primary" mat-dialog-close><mat-icon>save</mat-icon> Opslaan</button>
    </mat-dialog-actions>
</form>
