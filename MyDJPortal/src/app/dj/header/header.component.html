<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" [routerLink]="'.'">MyDJ Portal - DJ</a>
    
            <!-- Step 3: Toggle the value of the property when the toggler button is clicked. -->
            <button class="navbar-toggler" type="button" (click)="isMenuCollapsed = !isMenuCollapsed">&#9776;</button>
    
            <!-- Step 2: Add the ngbCollapse directive to the element below. -->
            <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <!-- Step 4: Close the menu when a link is clicked. -->
                        <a class="nav-link" routerLink="/dj/dashboard" routerLinkActive="active"  (click)="isMenuCollapsed = true">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <!-- Step 4: Close the menu when a link is clicked. -->
                        <a class="nav-link" routerLink="/dj/clients" routerLinkActive="active" (click)="isMenuCollapsed = true">Klanten</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
