<h2 mat-dialog-title><mat-icon>edit</mat-icon> Klant bewerken</h2>

<form [formGroup]="editClientForm" (ngSubmit)="editClient()">
    <mat-dialog-content class="mat-typography">
        <mat-form-field appearance="legacy" class="full-width">
            <mat-label>Naam</mat-label>
            <input matInput type="text" name="name" formControlName="name">
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Adres</mat-label>
            <input matInput type="text" name="address1" formControlName="address1">
        </mat-form-field>

        <mat-form-field appearance="fill" class="half-width">
            <mat-label>Postcode</mat-label>
            <input matInput type="text" name="postal_code" formControlName="postal_code">
        </mat-form-field>
        <mat-form-field appearance="fill" class="half-width">
            <mat-label>Woonplaats</mat-label>
            <input matInput type="text" name="city" formControlName="city">
        </mat-form-field>

        <div formGroupName="contacts">
            <h3>Contactpersoon</h3>

            <mat-form-field appearance="fill" class="half-width">
                <mat-label>Voornaam</mat-label>
                <input matInput type="text" name="first_name" formControlName="first_name">
            </mat-form-field>
            <mat-form-field appearance="fill" class="half-width">
                <mat-label>Achternaam</mat-label>
                <input matInput type="text" name="last_name" formControlName="last_name"> 
            </mat-form-field>

            <mat-form-field appearance="fill" class="half-width">
                <mat-label>E-mailadres</mat-label>
                <input matInput type="text" name="email" formControlName="email">
            </mat-form-field>
            <mat-form-field appearance="fill" class="half-width">
                <mat-label>Telefoonnummer</mat-label>
                <input matInput type="text" name="phone" formControlName="phone">
            </mat-form-field>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions>
        <button mat-button mat-dialog-close>Annuleren</button>
        <button type="submit" mat-raised-button color="primary" mat-dialog-close><mat-icon>save</mat-icon> Opslaan</button>
    </mat-dialog-actions>
</form>
