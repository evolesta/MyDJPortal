<app-dj-aheader></app-dj-aheader>

<div class="content">
    <h1>Klanten</h1>

    <p><button type="button" mat-raised-button color="primary" (click)="openAddNewClientDialog()"><mat-icon>add</mat-icon> Nieuwe klant</button></p>

    <div class="mat-elevation-z8">
        <table mat-table [dataSource]="clientsSource">
            <ng-container matColumnDef="number">
                <th mat-header-cell *matHeaderCellDef>Klantnummer</th>
                <td mat-cell *matCellDef="let element">{{ element.number }}</td>
            </ng-container>
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Naam</th>
                <td mat-cell *matCellDef="let element">{{ element.name }}</td>
            </ng-container>
            <ng-container matColumnDef="contact_name">
                <th mat-header-cell *matHeaderCellDef>Contactpersoon</th>
                <td mat-cell *matCellDef="let element">{{ element.contacts[0].first_name }} {{ element.contacts[0].last_name }}</td>
            </ng-container>
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let element">{{ element.contacts[0].email }}</td>
            </ng-container>
            <ng-container matColumnDef="options">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element" class="options">
                    <button mat-icon-button [matMenuTriggerFor]="menu">
                        <mat-icon>more_vert</mat-icon>
                      </button>
                      <mat-menu #menu="matMenu">
                        <button mat-menu-item (click)="openEditClientDialog(element.id)">
                          <mat-icon>edit</mat-icon>
                          <span>Bewerken</span>
                        </button>
                        <button mat-menu-item (click)="openDeleteClientDialog(element.id)">
                          <mat-icon>delete</mat-icon>
                          <span>Verwijderen</span>
                        </button>
                      </mat-menu>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[10, 25, 50]"
                 showFirstLastButtons 
                 aria-label="Select page of periodic elements">
  </mat-paginator>
    </div>
</div>

<app-dj-afooter></app-dj-afooter>
